  .pick{border:none;border-radius:12px;width:42px;height:42px;font-size:22px;font-family:inherit;cursor:pointer;background:#fff;color:#888;box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .pick.on{color:#fff;}
  .tile{width:70px;height:70px;border-radius:18px;color:#fff;font-size:44px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 rgba(0,0,0,.12);text-shadow:2px 2px 0 rgba(0,0,0,.15);}
  .mtile{position:absolute;top:45px;transition:left .6s cubic-bezier(.5,-0.3,.4,1.4),opacity .3s,transform .4s;}
  #tCho{left:calc(50% - 95px);}
  #tJung{left:calc(50% + 25px);}
  /* 합쳐지는 순간: 가운데로 모이기 */
  #stage.merging #tCho{left:calc(50% - 50px);}
  #stage.merging #tJung{left:calc(50% - 20px);}
  #stage.done #tCho,#stage.done #tJung{opacity:0;transform:scale(.4);}
  .mres{position:absolute;top:35px;left:calc(50% - 45px);width:90px;height:90px;font-size:60px;opacity:0;transform:scale(.3);transition:opacity .4s,transform .5s cubic-bezier(.4,-0.2,.3,1.6);}
  #stage.done .mres{opacity:1;transform:scale(1);}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  #stage.done .mres.pop{animation:pop .4s;}
  .qbig{border:none;background:#fff;border-radius:30px;padding:24px 40px;font-size:80px;font-weight:700;color:#ff8fb1;box-shadow:0 8px 0 #f3d0dd;cursor:pointer;}
  .choice{border:none;border-radius:24px;width:100px;height:120px;box-shadow:0 6px 0 rgba(0,0,0,.12);cursor:pointer;font-size:56px;font-weight:700;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.15);}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .shake{animation:shake .4s;}
  .diag{font-size:13px;background:#fff8;border-radius:12px;padding:8px 12px;margin-bottom:12px;color:#a06;}

function getSrc(key){ if(!key) return null; return "sounds/"+key+".m4a"; }
function speak(text){try{var u=new SpeechSynthesisUtterance(text);u.lang="ko-KR";u.rate=0.8;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function ensureAudio(){if(!audioEl){audioEl=new Audio();audioEl.setAttribute('playsinline','');}return audioEl;}
function playKey(keys,fb){
  var list=Array.isArray(keys)?keys:[keys];
  var srcs=[];for(var x=0;x<list.length;x++){var s=getSrc(list[x]);if(s)srcs.push(s);}
  if(srcs.length===0){if(fb)speak(fb);return;}
  try{speechSynthesis.cancel();}catch(e){}
  // 이전 재생 중단
  if(audioEl){try{audioEl.pause();}catch(e){}}
  playSeqId=(playSeqId||0)+1;
  var myId=playSeqId;
  var i=0;
  function next(){
    if(myId!==playSeqId)return;        // 새 재생이 시작되면 이 시퀀스 중단
    if(i>=srcs.length)return;
    var src=srcs[i++];
    var a=new Audio(src);
    a.setAttribute('playsinline','');
    audioEl=a;
    var advanced=false;
    function go(){if(advanced)return;advanced=true;next();}
    a.onended=go;
    a.onerror=go;
    var p=a.play();
    if(p&&p.catch)p.catch(function(err){diag("재생 차단됨: "+err.name+" — 화면을 한 번 탭한 뒤 다시 눌러보세요");go();});

    a.onloadedmetadata=function(){
      var ms=(isFinite(a.duration)?a.duration*1000:600)+120;
      setTimeout(go,ms);
    };
  }
  next();
}

// 따라쓰기 (획순 안내)
var drawing=false;
var wStrokes=[];      // 현재 글자의 획 목록
var wStep=0;          // 현재 그릴 획 번호
var wHit=[];          // 현재 획에서 지나간 점 표시
var wCtx=null,wCanvas=null;

function strokeColor(){return state.writeChar.color;}

function drawGuide(){
  var ctx=wCtx;if(!ctx)return;
  ctx.clearRect(0,0,300,300);
  // 배경 글자(아주 연하게)
  ctx.font="240px Jua,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle="#f2f2f2";ctx.fillText(state.writeChar.char,150,158);
  // 이미 완성한 획: 색칠된 상태로 표시
  for(var s=0;s<wStep;s++)drawStrokeLine(wStrokes[s],strokeColor(),18,1);
  // 현재 획: 점선 + 시작점 번호 + 화살표
  if(wStep<wStrokes.length){
    var cur=wStrokes[wStep];
    drawStrokeLine(cur,"#bbb",6,1,true);
    // 시작점 마커
    var p0=cur[0];
    ctx.beginPath();ctx.fillStyle="#ff6b9d";ctx.arc(p0[0],p0[1],16,0,7);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="20px Jua,sans-serif";ctx.fillText(String(wStep+1),p0[0],p0[1]+1);
    // 방향 화살표(끝점)
    var pe=cur[cur.length-1],pp=cur[cur.length-2]||p0;
    drawArrow(pp,pe);
  }
}
function drawStrokeLine(stroke,color,width,alpha,dashed){
  var ctx=wCtx;ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width;
  ctx.lineCap="round";ctx.lineJoin="round";if(dashed)ctx.setLineDash([2,12]);
  ctx.beginPath();ctx.moveTo(stroke[0][0],stroke[0][1]);
  for(var i=1;i<stroke.length;i++)ctx.lineTo(stroke[i][0],stroke[i][1]);
  ctx.stroke();ctx.setLineDash([]);ctx.restore();
}
function drawArrow(from,to){
  var ctx=wCtx;var ang=Math.atan2(to[1]-from[1],to[0]-from[0]);
  ctx.save();ctx.fillStyle="#ff6b9d";ctx.translate(to[0],to[1]);ctx.rotate(ang);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-16,-8);ctx.lineTo(-16,8);ctx.closePath();ctx.fill();ctx.restore();
}

function setupCanvas(){
  wCanvas=document.getElementById('cv');if(!wCanvas)return;
  wCtx=wCanvas.getContext('2d');
  wStrokes=STROKES[state.writeChar.char]||[[[80,80],[220,220]]];
  wStep=0;wHit=[];state.traced=false;
  drawGuide();
  var bf=document.getElementById('barfill');if(bf){bf.style.width="0";bf.style.background="#ffd86b";}
  var pr=document.getElementById('praise');if(pr)pr.textContent="";
  function P(e){var r=wCanvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(300/r.width),y:(t.clientY-r.top)*(300/r.height)};}
  function near(p,pt,d){var dx=p.x-pt[0],dy=p.y-pt[1];return dx*dx+dy*dy<=d*d;}
  function checkProgress(p){
    if(wStep>=wStrokes.length)return;
    var cur=wStrokes[wStep];
    if(!cur._samples)cur._samples=sampleStroke(cur);
    var sm=cur._samples;
    for(var i=0;i<sm.length;i++){if(!wHit[i]&&near(p,sm[i],28))wHit[i]=true;}
    var done=0;for(var k=0;k<sm.length;k++)if(wHit[k])done++;
    var ratio=done/sm.length;
    drawGuide();                 // 가이드 + 완성획 다시 그림
    drawPartial(cur,sm,wHit);    // 현재 획에서 지나간 부분만 색칠
    var total=(wStep+ratio)/wStrokes.length;
    var bf=document.getElementById('barfill');if(bf)bf.style.width=Math.round(total*100)+"%";
    if(ratio>=0.85){
      wStep++;wHit=[];
      drawGuide();
      if(wStep>=wStrokes.length)finishWrite();
    }
  }
  wCanvas.onmousedown=wCanvas.ontouchstart=function(e){e.preventDefault();drawing=true;checkProgress(P(e));};
  wCanvas.onmousemove=wCanvas.ontouchmove=function(e){if(!drawing)return;e.preventDefault();checkProgress(P(e));};
  wCanvas.onmouseup=wCanvas.ontouchend=wCanvas.onmouseleave=function(){drawing=false;};
}
// 현재 획에서 지나간 샘플점들을 색칠
function drawPartial(stroke,samples,hit){
  var ctx=wCtx;ctx.save();ctx.strokeStyle=strokeColor();ctx.lineWidth=18;ctx.lineCap="round";ctx.lineJoin="round";
  var seg=[],i;
  for(i=0;i<samples.length;i++){
    if(hit[i]){seg.push(samples[i]);}
    else{flush();seg=[];}
  }
  flush();ctx.restore();
  function flush(){if(seg.length<1)return;ctx.beginPath();ctx.moveTo(seg[0][0],seg[0][1]);for(var j=1;j<seg.length;j++)ctx.lineTo(seg[j][0],seg[j][1]);if(seg.length===1)ctx.lineTo(seg[0][0]+0.1,seg[0][1]);ctx.stroke();}
}
function sampleStroke(stroke){
  var pts=[];
  for(var i=0;i<stroke.length-1;i++){
    var a=stroke[i],b=stroke[i+1];
    var dist=Math.hypot(b[0]-a[0],b[1]-a[1]);
    var n=Math.max(2,Math.round(dist/12));
    for(var t=0;t<n;t++)pts.push([a[0]+(b[0]-a[0])*t/n,a[1]+(b[1]-a[1])*t/n]);
  }
  pts.push(stroke[stroke.length-1]);
  return pts;
}

// 받침 앞글자(가/고/무...)의 음절 사운드 key 찾기
function baseSylKey(baseChar){
  var code=baseChar.charCodeAt(0)-0xac00;if(code<0)return null;
  var ci=Math.floor(code/(21*28));        // 초성 index
  var ji=Math.floor((code%(21*28))/28);   // 중성 index
  var CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  var JUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  var consMap={"ㄱ":"g","ㄴ":"n","ㄷ":"d","ㄹ":"r","ㅁ":"m","ㅂ":"b","ㅅ":"s","ㅇ":"ng","ㅈ":"j","ㅊ":"ch","ㅋ":"k","ㅌ":"t","ㅍ":"p","ㅎ":"h"};
  return syllableKey(consMap[CHO[ci]],JUNG[ji]);
}

function newQuiz(){var pool=state.tab==="consonant"?consonants:vowels;var ans=pool[Math.floor(Math.random()*pool.length)];var opts=[ans];while(opts.length<3){var c=pool[Math.floor(Math.random()*pool.length)];if(!opts.find(function(o){return o.char===c.char;}))opts.push(c);}opts.sort(function(){return Math.random()-0.5;});state.quiz=ans;state.choices=opts;state.fb=null;playKey(ans.key,ans.name);}
function renderChoices(){var c=document.getElementById('choices');if(!c)return;var h="";state.choices.forEach(function(o,idx){h+='<button class="choice" style="background:'+o.color+'" onclick="answer('+idx+',this)">'+o.char+'</button>';});c.innerHTML=h;}
function answer(idx,btn){if(state.fb==="correct")return;var o=state.choices[idx];if(o.char===state.quiz.char){state.fb="correct";btn.style.background="#9be7c4";setStars(state.stars+1);playKey("correct","정답이에요");document.getElementById('qfb').textContent="🎉 정답이에요! ⭐";setTimeout(function(){newQuiz();renderView();},1400);}else{btn.classList.add("shake");setTimeout(function(){btn.classList.remove("shake");},400);playKey("again","다시 해봐요");document.getElementById('qfb').textContent="다시 한 번! 💪";}}
window.answer=answer;

// 첫소리 놀이
function consByKey(k){for(var i=0;i<consonants.length;i++)if(consonants[i].key===k)return consonants[i];return null;}
function newFirstQ(){
  var word=readWords[Math.floor(Math.random()*readWords.length)];
  var correct=consByKey(word.first);
  var opts=[correct];
  while(opts.length<3){
    var c=consonants[Math.floor(Math.random()*consonants.length)];
    if(!opts.find(function(o){return o.key===c.key;}))opts.push(c);
  }
  opts.sort(function(){return Math.random()-0.5;});
  state.firstQ={word:word,correct:correct,opts:opts};state.ffb=null;
  // 단어 소리 들려주기
  playKey(word.snd,word.w);
}
function renderFChoices(){
  var box=document.getElementById('fchoices');if(!box)return;var h="";
  state.firstQ.opts.forEach(function(o,idx){
    h+='<button class="choice" style="background:'+o.color+'" onclick="answerFirst('+idx+',this)">'+o.char+'</button>';
  });
  box.innerHTML=h;
}
function answerFirst(idx,btn){
  if(state.ffb==="correct")return;
  var o=state.firstQ.opts[idx];
  if(o.key===state.firstQ.correct.key){
    state.ffb="correct";btn.style.background="#9be7c4";
    setStars(state.stars+1);
    playKey([o.key],null); // 맞은 자음 소리
    setTimeout(function(){playKey("correct","정답이에요");},500);
    document.getElementById('ffb').textContent="🎉 "+state.firstQ.word.w+"! ⭐";
    setTimeout(function(){newFirstQ();renderView();},1700);
  }else{
    btn.classList.add("shake");setTimeout(function(){btn.classList.remove("shake");},400);
    playKey("again","다시 해봐요");
    document.getElementById('ffb').textContent="다시 들어봐요! 💪";
  }
}
window.answerFirst=answerFirst;

function resetStars(){if(confirm("모은 별을 모두 지울까요?")){setStars(0);renderView();}}
window.resetStars=resetStars;
function renderAll(){renderModes();renderTabs();renderView();}
setStars(state.stars); // 저장된 별 표시
renderAll();

</script>
