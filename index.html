<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐣 한글 놀이</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Jua','Comic Sans MS',sans-serif; margin:0; color:#5a4a42;
    background:radial-gradient(circle at 20% 20%,#FFF6CC 0,transparent 40%),radial-gradient(circle at 80% 30%,#D5F0FF 0,transparent 40%),linear-gradient(160deg,#FFEAF4 0,#E8F7FF 100%);
    min-height:100vh; padding:18px 14px 60px; }
  .wrap{max-width:480px;margin:0 auto;}
  h1{font-size:26px;margin:0;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .stars{background:#fff;border-radius:999px;padding:6px 14px;font-size:18px;box-shadow:0 4px 0 #ffd86b;}
  .modes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .modes button{flex:1 1 auto;border:none;border-radius:16px;padding:12px 8px;font-size:16px;font-family:inherit;cursor:pointer;color:#a08;background:#fff;box-shadow:0 5px 0 #f3d0dd;}
  .modes button.on{color:#fff;background:#ff8fb1;box-shadow:0 5px 0 #e06b92;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tabs button{flex:1;border:none;border-radius:14px;padding:10px 0;font-size:16px;font-family:inherit;cursor:pointer;background:#ffffffaa;color:#4a6;}
  .tabs button.on{background:#9be7c4;box-shadow:0 4px 0 #6fcf9f;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
  .card{border:none;border-radius:24px;padding:18px 10px;box-shadow:0 6px 0 rgba(0,0,0,.12);cursor:pointer;font-family:inherit;transition:transform .15s;}
  .card:active{transform:scale(1.08) rotate(-3deg);}
  .card .emoji{font-size:44px;}
  .card .ch{font-size:52px;font-weight:700;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.15);}
  .card .nm{font-size:18px;color:#fff;}
  .card .wd{font-size:15px;color:#fff;opacity:.9;}
  .center{text-align:center;}
  canvas{border-radius:18px;touch-action:none;background:#fafafa;width:min(78vw,300px);height:min(78vw,300px);}
  .bar{background:#fff;border-radius:999px;height:20px;margin:14px auto;max-width:300px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.1);}
  .bar>div{height:100%;background:#ffd86b;width:0;transition:width .15s;}
  .small{border:none;border-radius:14px;padding:10px 18px;font-size:16px;font-family:inherit;cursor:pointer;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.12);}
  .pick{border:none;border-radius:12px;width:42px;height:42px;font-size:22px;font-family:inherit;cursor:pointer;background:#fff;color:#888;box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .pick.on{color:#fff;}
  .tile{width:70px;height:70px;border-radius:18px;color:#fff;font-size:44px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 rgba(0,0,0,.12);text-shadow:2px 2px 0 rgba(0,0,0,.15);}
  .mtile{position:absolute;top:45px;transition:left .6s cubic-bezier(.5,-0.3,.4,1.4),opacity .3s,transform .4s;}
  #tCho{left:calc(50% - 95px);}
  #tJung{left:calc(50% + 25px);}
  /* 합쳐지는 순간: 가운데로 모이기 */
  #stage.merging #tCho{left:calc(50% - 50px);}
  #stage.merging #tJung{left:calc(50% - 20px);}
  #stage.done #tCho,#stage.done #tJung{opacity:0;transform:scale(.4);}
  .mres{position:absolute;top:35px;left:calc(50% - 45px);width:90px;height:90px;font-size:60px;opacity:0;transform:scale(.3);transition:opacity .4s,transform .5s cubic-bezier(.4,-0.2,.3,1.6);}
  #stage.done .mres{opacity:1;transform:scale(1);}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  #stage.done .mres.pop{animation:pop .4s;}
  .qbig{border:none;background:#fff;border-radius:30px;padding:24px 40px;font-size:80px;font-weight:700;color:#ff8fb1;box-shadow:0 8px 0 #f3d0dd;cursor:pointer;}
  .choice{border:none;border-radius:24px;width:100px;height:120px;box-shadow:0 6px 0 rgba(0,0,0,.12);cursor:pointer;font-size:56px;font-weight:700;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.15);}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .shake{animation:shake .4s;}
  .diag{font-size:13px;background:#fff8;border-radius:12px;padding:8px 12px;margin-bottom:12px;color:#a06;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>🐣 한글 놀이</h1><div class="stars" onclick="resetStars()">⭐ <span id="stars">0</span></div></div>
  <div class="diag" id="diag">소리 준비됨. 글자를 누르면 소리가 나요.</div>
  <div class="modes" id="modes"></div>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>

var blobCache={}, audioEl=null, unlocked=false, playSeqId=0;
function diag(t){document.getElementById('diag').textContent=t;}
function getSrc(key){
  if(blobCache[key])return blobCache[key];
  var data=SOUNDS[key];if(!data)return null;
  try{
    var b64=data.split(",")[1];var bin=atob(b64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    var url=URL.createObjectURL(new Blob([bytes],{type:"audio/mp4"}));
    blobCache[key]=url;return url;
  }catch(e){return null;}
}
function speak(text){try{var u=new SpeechSynthesisUtterance(text);u.lang="ko-KR";u.rate=0.8;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function ensureAudio(){if(!audioEl){audioEl=new Audio();audioEl.setAttribute('playsinline','');}return audioEl;}
function playKey(keys,fb){
  var list=Array.isArray(keys)?keys:[keys];
  var srcs=[];for(var x=0;x<list.length;x++){var s=getSrc(list[x]);if(s)srcs.push(s);}
  if(srcs.length===0){if(fb)speak(fb);return;}
  try{speechSynthesis.cancel();}catch(e){}
  // 이전 재생 중단
  if(audioEl){try{audioEl.pause();}catch(e){}}
  playSeqId=(playSeqId||0)+1;
  var myId=playSeqId;
  var i=0;
  function next(){
    if(myId!==playSeqId)return;        // 새 재생이 시작되면 이 시퀀스 중단
    if(i>=srcs.length)return;
    var src=srcs[i++];
    var a=new Audio(src);
    a.setAttribute('playsinline','');
    audioEl=a;
    var advanced=false;
    function go(){if(advanced)return;advanced=true;next();}
    a.onended=go;
    a.onerror=go;
    var p=a.play();
    if(p&&p.catch)p.catch(function(err){diag("재생 차단됨: "+err.name+" — 화면을 한 번 탭한 뒤 다시 눌러보세요");go();});
    // 안전장치: 메타데이터로 길이를 알면 그 시간 뒤 강제 진행
    a.onloadedmetadata=function(){
      var ms=(isFinite(a.duration)?a.duration*1000:600)+120;
      setTimeout(go,ms);
    };
  }
  next();
}
function playItem(it){
  // 자음: 이름 먼저, 소리 나중 (예: "기역" → "그")
  if(it.name&&SOUNDS[it.key+"_name"])playKey([it.key+"_name",it.key],it.name);
  else playKey(it.key,it.name);
}
function playCombined(c,j){
  // 자음 소리 → 모음 소리 → 합쳐진 글자 순으로
  var seq=[c.key,j.key];
  if(j.char==="ㅏ"&&syllableA[c.key])seq.push(syllableA[c.key]);
  playKey(seq,combine(c.char,j.char));
}

var savedStars=0;try{savedStars=parseInt(localStorage.getItem('hangul_stars'))||0;}catch(e){}
var state={mode:"learn",tab:"consonant",stars:savedStars,writeChar:consonants[0],bCho:consonants[0],bJung:vowels[0],merged:false,quiz:null,choices:[],fb:null,progress:0,traced:false};
function setStars(n){state.stars=n;var el=document.getElementById('stars');if(el)el.textContent=n;try{localStorage.setItem('hangul_stars',n);}catch(e){}}
var modes=[["learn","📚 배우기"],["write","✏️ 따라쓰기"],["build","🧩 합치기"],["quiz","🎯 맞히기"],["zoo","🦁 도감"]];
function renderModes(){var h="";modes.forEach(function(m){h+='<button class="'+(state.mode===m[0]?"on":"")+'" onclick="setMode(\''+m[0]+'\')">'+m[1]+'</button>';});document.getElementById('modes').innerHTML=h;}
function renderTabs(){
  var t=document.getElementById('tabs');
  if(["learn","quiz","write"].indexOf(state.mode)<0){t.innerHTML="";return;}
  t.innerHTML='<button class="'+(state.tab==="consonant"?"on":"")+'" onclick="setTab(\'consonant\')">자음 ㄱㄴㄷ</button>'+
              '<button class="'+(state.tab==="vowel"?"on":"")+'" onclick="setTab(\'vowel\')">모음 ㅏㅑㅓ</button>';
}
function deck(){return state.tab==="consonant"?consonants:vowels;}
function setMode(m){state.mode=m;if(m==="quiz")newQuiz();renderAll();}
function setTab(t){state.tab=t;if(state.mode==="write")state.writeChar=deck()[0];if(state.mode==="quiz")newQuiz();renderAll();}
window.setMode=setMode;window.setTab=setTab;

function renderView(){
  var v=document.getElementById('view');var h="";
  if(state.mode==="learn"){
    h='<div class="grid">';
    deck().forEach(function(it,idx){
      h+='<button class="card" style="background:'+it.color+'" onclick="cardClick(\''+state.tab+'\','+idx+')">'+
         '<div class="emoji">'+it.emoji+'</div><div class="ch">'+it.char+'</div><div class="nm">'+it.name+'</div><div class="wd">'+it.word+'</div></button>';
    });
    h+='</div>';
  } else if(state.mode==="write"){
    h='<div class="center"><p style="font-size:18px;margin:0 0 8px">①번부터 화살표 방향으로 따라 그려요! ✏️</p>'+
      '<div style="background:#fff;border-radius:28px;padding:12px;box-shadow:0 6px 0 #f3d0dd;display:inline-block"><canvas id="cv" width="300" height="300"></canvas></div>'+
      '<div class="bar"><div id="barfill"></div></div><div id="praise" style="font-size:30px"></div>'+
      '<div style="display:flex;gap:8px;justify-content:center;margin-top:8px">'+
      '<button class="small" style="background:#ffb7b2" onclick="clearCanvas()">🧽 다시</button>'+
      '<button class="small" style="background:#a2d2ff" onclick="playItem(state.writeChar)">🔊 듣기</button></div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:14px" id="wpick"></div></div>';
  } else if(state.mode==="build"){
    h='<div class="center"><p style="font-size:18px;margin:0 0 10px">자음과 모음을 합치면 글자가 돼요! 🧩</p>'+
      '<div id="stage" style="position:relative;height:160px;margin:0 auto 14px;max-width:340px">'+
        '<div id="tCho" class="tile mtile" style="background:'+state.bCho.color+'">'+state.bCho.char+'</div>'+
        '<div id="tJung" class="tile mtile" style="background:'+state.bJung.color+'">'+state.bJung.char+'</div>'+
        '<div id="tRes" class="tile mres" style="background:#ff8fb1">'+(state.merged?combine(state.bCho.char,state.bJung.char):"?")+'</div>'+
      '</div>'+
      '<button class="small" id="mergeBtn" style="background:#9be7c4;box-shadow:0 6px 0 #6fcf9f;padding:14px 40px;font-size:24px;margin-bottom:18px" onclick="doMerge()">✨ 합치기!</button>'+
      '<div style="margin-bottom:6px;font-size:15px;color:#999">자음 고르기</div><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px" id="bcho"></div>'+
      '<div style="margin-bottom:6px;font-size:15px;color:#999">모음 고르기</div><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center" id="bjung"></div></div>';
  } else if(state.mode==="quiz"){
    var q=state.quiz;if(!q){v.innerHTML="";return;}
    h='<div class="center"><p style="font-size:20px;margin-bottom:6px">이 글자를 찾아봐요!</p>'+
      '<button class="qbig" onclick="playKey(state.quiz.key,state.quiz.name)">🔊</button>'+
      '<p style="font-size:14px;color:#999;margin-top:4px">(눌러서 다시 듣기)</p>'+
      '<div style="display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap" id="choices"></div>'+
      '<div id="qfb" style="font-size:34px;margin-top:18px"></div></div>';
  } else if(state.mode==="zoo"){
    h='<p style="font-size:18px;text-align:center;margin:0 0 16px">별을 모으면 친구가 나타나요! ⭐ → 🦁</p><div class="grid">';
    zoo.forEach(function(z){var u=state.stars>=z.at;
      h+='<div onclick="'+(u?"speak(\'"+z.n+"\')":"")+'" style="background:#fff;border-radius:24px;padding:20px 10px;text-align:center;box-shadow:0 6px 0 rgba(0,0,0,.1);opacity:'+(u?1:.85)+'">'+
         '<div style="font-size:56px;'+(u?"":"filter:grayscale(1) brightness(1.6)")+'">'+(u?z.e:"❔")+'</div>'+
         '<div style="font-size:18px;color:'+(u?"#5a4a42":"#bbb")+'">'+(u?z.n:"⭐ "+z.at)+'</div></div>';
    });
    h+='</div>';
  }
  v.innerHTML=h;
  if(state.mode==="write"){setupCanvas();renderWpick();}
  if(state.mode==="build"){renderBuildPicks();}
  if(state.mode==="quiz"){renderChoices();}
}
function cardClick(tab,idx){var it=(tab==="consonant"?consonants:vowels)[idx];playItem(it);}
window.cardClick=cardClick;window.playItem=playItem;window.playKey=playKey;window.speak=speak;window.state=state;

// 따라쓰기 (획순 안내)
var drawing=false;
var wStrokes=[];      // 현재 글자의 획 목록
var wStep=0;          // 현재 그릴 획 번호
var wHit=[];          // 현재 획에서 지나간 점 표시
var wCtx=null,wCanvas=null;

function strokeColor(){return state.writeChar.color;}

function drawGuide(){
  var ctx=wCtx;if(!ctx)return;
  ctx.clearRect(0,0,300,300);
  // 배경 글자(아주 연하게)
  ctx.font="240px Jua,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle="#f2f2f2";ctx.fillText(state.writeChar.char,150,158);
  // 이미 완성한 획: 색칠된 상태로 표시
  for(var s=0;s<wStep;s++)drawStrokeLine(wStrokes[s],strokeColor(),22,1);
  // 현재 획: 점선 + 시작점 번호 + 화살표
  if(wStep<wStrokes.length){
    var cur=wStrokes[wStep];
    drawStrokeLine(cur,"#bbb",6,1,true);
    // 시작점 마커
    var p0=cur[0];
    ctx.beginPath();ctx.fillStyle="#ff6b9d";ctx.arc(p0[0],p0[1],16,0,7);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="20px Jua,sans-serif";ctx.fillText(String(wStep+1),p0[0],p0[1]+1);
    // 방향 화살표(끝점)
    var pe=cur[cur.length-1],pp=cur[cur.length-2]||p0;
    drawArrow(pp,pe);
  }
}
function drawStrokeLine(stroke,color,width,alpha,dashed){
  var ctx=wCtx;ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width;
  ctx.lineCap="round";ctx.lineJoin="round";if(dashed)ctx.setLineDash([2,12]);
  ctx.beginPath();ctx.moveTo(stroke[0][0],stroke[0][1]);
  for(var i=1;i<stroke.length;i++)ctx.lineTo(stroke[i][0],stroke[i][1]);
  ctx.stroke();ctx.setLineDash([]);ctx.restore();
}
function drawArrow(from,to){
  var ctx=wCtx;var ang=Math.atan2(to[1]-from[1],to[0]-from[0]);
  ctx.save();ctx.fillStyle="#ff6b9d";ctx.translate(to[0],to[1]);ctx.rotate(ang);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-16,-8);ctx.lineTo(-16,8);ctx.closePath();ctx.fill();ctx.restore();
}

function setupCanvas(){
  wCanvas=document.getElementById('cv');if(!wCanvas)return;
  wCtx=wCanvas.getContext('2d');
  wStrokes=STROKES[state.writeChar.char]||[[[80,80],[220,220]]];
  wStep=0;wHit=[];state.traced=false;
  drawGuide();
  var bf=document.getElementById('barfill');if(bf){bf.style.width="0";bf.style.background="#ffd86b";}
  var pr=document.getElementById('praise');if(pr)pr.textContent="";
  function P(e){var r=wCanvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(300/r.width),y:(t.clientY-r.top)*(300/r.height)};}
  function near(p,pt,d){var dx=p.x-pt[0],dy=p.y-pt[1];return dx*dx+dy*dy<=d*d;}
  function checkProgress(p){
    if(wStep>=wStrokes.length)return;
    var cur=wStrokes[wStep];
    // 곡선/직선을 따라 촘촘한 샘플점 생성
    if(!cur._samples)cur._samples=sampleStroke(cur);
    var sm=cur._samples;
    for(var i=0;i<sm.length;i++){if(!wHit[i]&&near(p,sm[i],26))wHit[i]=true;}
    var done=0;for(var k=0;k<sm.length;k++)if(wHit[k])done++;
    var ratio=done/sm.length;
    // 전체 진행바: (완성획 + 현재획 비율)/총획
    var total=(wStep+ratio)/wStrokes.length;
    var bf=document.getElementById('barfill');if(bf)bf.style.width=Math.round(total*100)+"%";
    if(ratio>=0.8){ // 이 획 거의 다 그림 → 다음 획
      wStep++;wHit=[];
      drawGuide();
      if(wStep>=wStrokes.length)finishWrite();
    }
  }
  wCanvas.onmousedown=wCanvas.ontouchstart=function(e){e.preventDefault();drawing=true;var p=P(e);wCtx.beginPath();wCtx.moveTo(p.x,p.y);checkProgress(p);};
  wCanvas.onmousemove=wCanvas.ontouchmove=function(e){if(!drawing)return;e.preventDefault();var p=P(e);
    wCtx.strokeStyle=strokeColor();wCtx.lineWidth=24;wCtx.lineCap="round";wCtx.lineJoin="round";wCtx.lineTo(p.x,p.y);wCtx.stroke();
    checkProgress(p);};
  wCanvas.onmouseup=wCanvas.ontouchend=wCanvas.onmouseleave=function(){drawing=false;};
}
function sampleStroke(stroke){
  var pts=[];
  for(var i=0;i<stroke.length-1;i++){
    var a=stroke[i],b=stroke[i+1];
    var dist=Math.hypot(b[0]-a[0],b[1]-a[1]);
    var n=Math.max(2,Math.round(dist/12));
    for(var t=0;t<n;t++)pts.push([a[0]+(b[0]-a[0])*t/n,a[1]+(b[1]-a[1])*t/n]);
  }
  pts.push(stroke[stroke.length-1]);
  return pts;
}
function finishWrite(){
  if(state.traced)return;state.traced=true;
  var bf=document.getElementById('barfill');if(bf){bf.style.width="100%";bf.style.background="#9be7c4";}
  var pr=document.getElementById('praise');if(pr)pr.textContent="🎉 참 잘했어요! ⭐";
  setStars(state.stars+1);
  playItem(state.writeChar);
  setTimeout(function(){playKey("good","참 잘했어요");},900);
}
function clearCanvas(){setupCanvas();}
window.clearCanvas=clearCanvas;
function renderWpick(){var w=document.getElementById('wpick');if(!w)return;var h="";deck().forEach(function(d,idx){var on=state.writeChar.char===d.char;h+='<button class="pick'+(on?" on":"")+'" style="width:44px;height:44px;font-size:24px;'+(on?"background:"+d.color:"")+'" onclick="setWrite(\''+state.tab+'\','+idx+')">'+d.char+'</button>';});w.innerHTML=h;}
function setWrite(tab,idx){state.writeChar=(tab==="consonant"?consonants:vowels)[idx];renderView();}
window.setWrite=setWrite;

// 합치기
function doMerge(){
  var c=state.bCho,j=state.bJung;
  var stage=document.getElementById('stage');
  var btn=document.getElementById('mergeBtn');
  var res=document.getElementById('tRes');
  if(!stage)return;
  // 초기화
  state.merged=false;
  stage.classList.remove('merging','done');
  res.classList.remove('pop');
  res.textContent="?";
  if(btn)btn.disabled=true;
  var hasSyl=(j.char==="ㅏ"&&syllableA[c.key]);
  // 1) 자음 소리
  playKey(c.key);
  // 2) 0.7초 뒤: 모음 소리 + 모이기 시작
  setTimeout(function(){
    playKey(j.key);
    stage.classList.add('merging');
  },700);
  // 3) 1.4초 뒤: 합쳐진 글자 등장 + 소리
  setTimeout(function(){
    res.textContent=combine(c.char,j.char);
    stage.classList.add('done');
    void res.offsetWidth; // reflow
    res.classList.add('pop');
    state.merged=true;
    if(hasSyl)playKey(syllableA[c.key]);
    if(btn)btn.disabled=false;
  },1400);
}
window.doMerge=doMerge;
function renderBuildPicks(){
  var bc=document.getElementById('bcho'),bj=document.getElementById('bjung');
  var h1="";consonants.forEach(function(c,idx){var on=state.bCho.char===c.char;h1+='<button class="pick'+(on?" on":"")+'" style="'+(on?"background:"+c.color:"")+'" onclick="setBCho('+idx+')">'+c.char+'</button>';});bc.innerHTML=h1;
  var h2="";vowels.forEach(function(vv,idx){var on=state.bJung.char===vv.char;h2+='<button class="pick'+(on?" on":"")+'" style="'+(on?"background:"+vv.color:"")+'" onclick="setBJung('+idx+')">'+vv.char+'</button>';});bj.innerHTML=h2;
}
function setBCho(i){state.bCho=consonants[i];state.merged=false;renderView();}
function setBJung(i){state.bJung=vowels[i];state.merged=false;renderView();}
window.setBCho=setBCho;window.setBJung=setBJung;

// 퀴즈
function newQuiz(){var pool=state.tab==="consonant"?consonants:vowels;var ans=pool[Math.floor(Math.random()*pool.length)];var opts=[ans];while(opts.length<3){var c=pool[Math.floor(Math.random()*pool.length)];if(!opts.find(function(o){return o.char===c.char;}))opts.push(c);}opts.sort(function(){return Math.random()-0.5;});state.quiz=ans;state.choices=opts;state.fb=null;playKey(ans.key,ans.name);}
function renderChoices(){var c=document.getElementById('choices');if(!c)return;var h="";state.choices.forEach(function(o,idx){h+='<button class="choice" style="background:'+o.color+'" onclick="answer('+idx+',this)">'+o.char+'</button>';});c.innerHTML=h;}
function answer(idx,btn){if(state.fb==="correct")return;var o=state.choices[idx];if(o.char===state.quiz.char){state.fb="correct";btn.style.background="#9be7c4";setStars(state.stars+1);playKey("correct","정답이에요");document.getElementById('qfb').textContent="🎉 정답이에요! ⭐";setTimeout(function(){newQuiz();renderView();},1400);}else{btn.classList.add("shake");setTimeout(function(){btn.classList.remove("shake");},400);playKey("again","다시 해봐요");document.getElementById('qfb').textContent="다시 한 번! 💪";}}
window.answer=answer;

function resetStars(){if(confirm("모은 별을 모두 지울까요?")){setStars(0);renderView();}}
window.resetStars=resetStars;
function renderAll(){renderModes();renderTabs();renderView();}
setStars(state.stars); // 저장된 별 표시
renderAll();

</script>
